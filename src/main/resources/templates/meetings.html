<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}">Meetings</title>
  <style>
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background-color: #f2f2f2; }
  </style>
</head>
<body>
<h1 th:text="${message}">Meetings</h1>

<table>
  <thead>
  <tr>
    <th>Name</th>
    <th>Description</th>
    <th>Date</th>
    <th>Room-ID</th>
    <th>Maximum participants</th>
  </tr>
  </thead>
  <tbody>
  <!-- 'meetings' är namnet på listan du skickar med i din Controller -->
  <tr th:each="meeting : ${meetings}">
    <td th:text="${meeting.name}">Name</td>
    <td th:text="${meeting.description}">Description</td>
    <td th:text="${meeting.date}">Date</td>
    <td th:text="${meeting.roomId}">Room-ID</td>
    <td th:text="${meeting.maxParticipants}">Maximum participants</td>
  </tr>
  </tbody>
</table>

<!-- Om listan är tom -->
<p th:if="${#lists.isEmpty(meetings)}">No meetings booked</p>

</body>
</html>
