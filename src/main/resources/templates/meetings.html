<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Meetings</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 32px;
            font-size: 14px;
            color: #222;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        h1 { font-size: 20px; font-weight: 600; }

        /* Filter bar */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .filter-group input,
        .filter-group select {
            font-size: 13px;
            font-family: sans-serif;
            color: #222;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 10px;
            outline: none;
            background: #fff;
            height: 32px;
            box-sizing: border-box;
        }

        .filter-group input:focus,
        .filter-group select:focus {
            border-color: #aaa;
        }

        .filter-group input[type="date"] {
            width: 138px;
        }

        .filter-group input[type="text"] {
            width: 200px;
        }

        .filter-group select {
            width: 140px;
        }

        .filter-sep {
            font-size: 12px;
            color: #bbb;
            padding-bottom: 7px;
        }

        .clear-btn {
            font-size: 12px;
            color: #aaa;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 0 7px 0;
            font-family: sans-serif;
            text-decoration: underline;
            align-self: flex-end;
        }

        .clear-btn:hover { color: #555; }

        /* Results count */
        .results-meta {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 12px;
            min-height: 16px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid #e5e5e5;
        }

        th {
            font-size: 12px;
            color: #888;
            font-weight: 600;
        }

        .actions { display: flex; gap: 8px; }

        a { color: #222; font-size: 13px; }

        button {
            font-size: 13px;
            background: none;
            border: none;
            color: #888;
            cursor: pointer;
            padding: 0;
            font-family: sans-serif;
        }

        button:hover { color: #c0392b; }

        .empty { color: #aaa; margin-top: 16px; }

        tr.hidden-row { display: none; }

        .no-results {
            color: #aaa;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>

<div class="header">
    <h1 th:text="${message}">Meetings</h1>
    <a th:href="@{/meetings/new}">+ New meeting</a>
</div>

<!-- Filter bar (only shown when there are meetings) -->
<div class="filters" th:if="${not #lists.isEmpty(meetings)}">
    <div class="filter-group">
        <label for="filter-name">Name</label>
        <input type="text" id="filter-name" placeholder="Search by name…">
    </div>

    <div class="filter-group">
        <label>Date range</label>
        <div style="display:flex;align-items:center;gap:6px;">
            <input type="date" id="filter-date-from">
            <span class="filter-sep">–</span>
            <input type="date" id="filter-date-to">
        </div>
    </div>

    <div class="filter-group">
        <label for="filter-room">Room</label>
        <select id="filter-room">
            <option value="">All rooms</option>
            <!-- Populated dynamically from table rows -->
        </select>
    </div>

    <button class="clear-btn" id="clear-filters">Clear filters</button>
</div>

<div class="results-meta" id="results-meta" th:if="${not #lists.isEmpty(meetings)}"></div>

<table th:if="${not #lists.isEmpty(meetings)}" id="meetings-table">
    <thead>
    <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Date</th>
        <th>Room</th>
        <th>Max</th>
        <th></th>
    </tr>
    </thead>
    <tbody id="meetings-body">
    <tr th:each="meeting : ${meetings}"
        th:data-name="${meeting.name}"
        th:data-date="${meeting.date}"
        th:data-room="${meeting.roomId}">
        <td th:text="${meeting.name}"></td>
        <td th:text="${meeting.description}"></td>
        <td th:text="${#temporals.format(meeting.date, 'dd MMM yyyy')}"></td>
        <td th:text="${meeting.roomId}"></td>
        <td th:text="${meeting.maxParticipants}"></td>
        <td>
            <div class="actions">
                <a th:href="@{/meetings/update/{id}(id=${meeting.id})}">Edit</a>
                <form th:action="@{/meetings/delete/{id}(id=${meeting.id})}" method="post">
                    <button type="submit" onclick="return confirm('Delete this meeting?')">
                        Delete
                    </button>
                </form>
            </div>
        </td>
    </tr>
    </tbody>
</table>

<p class="no-results" id="no-results">No meetings match your filters.</p>
<p class="empty" th:if="${#lists.isEmpty(meetings)}">No meetings scheduled.</p>

<script th:if="${not #lists.isEmpty(meetings)}">
    const nameInput   = document.getElementById('filter-name');
    const dateFrom    = document.getElementById('filter-date-from');
    const dateTo      = document.getElementById('filter-date-to');
    const roomSelect  = document.getElementById('filter-room');
    const clearBtn    = document.getElementById('clear-filters');
    const meta        = document.getElementById('results-meta');
    const noResults   = document.getElementById('no-results');
    const tbody       = document.getElementById('meetings-body');
    const allRows     = Array.from(tbody.querySelectorAll('tr'));

    // Populate room dropdown from unique room values in the table
    const rooms = [...new Set(allRows.map(r => r.dataset.room).filter(Boolean))].sort();
    rooms.forEach(room => {
        const opt = document.createElement('option');
        opt.value = room;
        opt.textContent = room;
        roomSelect.appendChild(opt);
    });

    function applyFilters() {
        const name     = nameInput.value.trim().toLowerCase();
        const from     = dateFrom.value;   // "YYYY-MM-DD" or ""
        const to       = dateTo.value;
        const room     = roomSelect.value;

        let visible = 0;

        allRows.forEach(row => {
            const rowName = (row.dataset.name || '').toLowerCase();
            const rowDate = (row.dataset.date || '').slice(0, 10); // "YYYY-MM-DD"
            const rowRoom = row.dataset.room || '';

            const matchName = !name || rowName.includes(name);
            const matchFrom = !from || rowDate >= from;
            const matchTo   = !to   || rowDate <= to;
            const matchRoom = !room || rowRoom === room;

            const show = matchName && matchFrom && matchTo && matchRoom;
            row.classList.toggle('hidden-row', !show);
            if (show) visible++;
        });

        const total = allRows.length;
        const filtered = visible < total;
        meta.textContent = filtered
            ? `Showing ${visible} of ${total} meeting${total !== 1 ? 's' : ''}`
            : '';
        noResults.style.display = visible === 0 ? 'block' : 'none';
    }

    nameInput.addEventListener('input', applyFilters);
    dateFrom.addEventListener('change', applyFilters);
    dateTo.addEventListener('change', applyFilters);
    roomSelect.addEventListener('change', applyFilters);

    clearBtn.addEventListener('click', () => {
        nameInput.value = '';
        dateFrom.value  = '';
        dateTo.value    = '';
        roomSelect.value = '';
        applyFilters();
    });

    // Initial state
    applyFilters();
</script>

</body>
</html>
