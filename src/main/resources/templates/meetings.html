<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Meetings</title>
    <style>
        body { font-family: sans-serif; padding: 32px; font-size: 14px; color: #222; }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        h1 { font-size: 20px; font-weight: 600; }

        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .filter-group { display: flex; flex-direction: column; gap: 4px; }

        .filter-group label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .filter-group input,
        .filter-group select {
            font-size: 13px;
            font-family: sans-serif;
            color: #222;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 6px 10px;
            outline: none;
            background: #fff;
            height: 32px;
            box-sizing: border-box;
        }

        .filter-group input:focus,
        .filter-group select:focus { border-color: #aaa; }

        .filter-group input[type="date"] { width: 138px; }
        .filter-group input[type="text"] { width: 200px; }
        .filter-group select             { width: 140px; }
        .filter-sep { font-size: 12px; color: #bbb; padding-bottom: 7px; }

        .filter-actions { display: flex; gap: 8px; align-items: flex-end; }

        .btn-apply {
            font-size: 13px; font-family: sans-serif;
            background: #222; color: #fff;
            border: none; border-radius: 6px;
            padding: 0 14px; height: 32px; cursor: pointer;
        }
        .btn-apply:hover { background: #444; }

        .btn-clear {
            font-size: 13px; font-family: sans-serif;
            background: none; color: #aaa;
            border: 1px solid #ddd; border-radius: 6px;
            padding: 0 14px; height: 32px; cursor: pointer;
            text-decoration: none; display: inline-flex; align-items: center;
        }
        .btn-clear:hover { color: #555; border-color: #aaa; }

        .results-meta { font-size: 12px; color: #aaa; margin-bottom: 12px; min-height: 16px; }

        table { width: 100%; border-collapse: collapse; }

        th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e5e5; }
        th { font-size: 12px; color: #888; font-weight: 600; }

        .actions { display: flex; gap: 8px; }
        a { color: #222; font-size: 13px; }

        button {
            font-size: 13px; background: none; border: none;
            color: #888; cursor: pointer; padding: 0; font-family: sans-serif;
        }
        button:hover { color: #c0392b; }

        .empty { color: #aaa; margin-top: 16px; }

        .pagination { display: flex; align-items: center; gap: 4px; margin-top: 24px; }

        .pagination a, .pagination span {
            display: inline-flex; align-items: center; justify-content: center;
            min-width: 32px; height: 32px; padding: 0 8px;
            border-radius: 6px; font-size: 13px; color: #222;
            text-decoration: none; border: 1px solid transparent;
        }
        .pagination a:hover  { border-color: #ddd; background: #f5f5f5; }
        .pagination .active  { border-color: #222; font-weight: 600; }
        .pagination .disabled { color: #ccc; pointer-events: none; }
    </style>
</head>
<body>

<div class="header">
    <h1 th:text="${message}">Meetings</h1>
    <a th:href="@{/meetings/new}">+ New meeting</a>
</div>

<form method="get" th:action="@{/meetings}">
    <input type="hidden" name="page" value="0"/>
    <input type="hidden" name="size" th:value="${size}"/>

    <div class="filters">
        <div class="filter-group">
            <label for="filter-name">Name</label>
            <input type="text" id="filter-name" name="name"
                   th:value="${filterName}" placeholder="Search by name…">
        </div>

        <div class="filter-group">
            <label>Date range</label>
            <div style="display:flex;align-items:center;gap:6px;">
                <input type="date" name="dateFrom" th:value="${filterDateFrom}">
                <span class="filter-sep">–</span>
                <input type="date" name="dateTo" th:value="${filterDateTo}">
            </div>
        </div>

        <div class="filter-group">
            <label for="filter-room">Room</label>
            <select id="filter-room" name="room">
                <option value="" th:selected="${filterRoom == null}">All rooms</option>
                <option th:each="room : ${allRooms}"
                        th:value="${room}"
                        th:text="${room}"
                        th:selected="${room == filterRoom}">
                </option>
            </select>
        </div>

        <div class="filter-actions">
            <button type="submit" class="btn-apply">Apply</button>
            <a th:href="@{/meetings(size=${size})}" class="btn-clear">Clear</a>
        </div>
    </div>
</form>

<div class="results-meta" th:if="${totalElements > 0}">
    <span th:if="${isFiltered}"
          th:text="${totalElements + (totalElements != 1 ? ' meetings' : ' meeting') + ' matching your filters'}">
    </span>
    <span th:unless="${isFiltered}"
          th:text="${totalElements + (totalElements != 1 ? ' meetings' : ' meeting')}">
    </span>
</div>

<table th:if="${not #lists.isEmpty(meetings)}">
    <thead>
    <tr>
        <th>Name</th>
        <th>Description</th>
        <th>Date</th>
        <th>Room</th>
        <th>Max</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="meeting : ${meetings}">
        <td th:text="${meeting.name}"></td>
        <td th:text="${meeting.description}"></td>
        <td th:text="${#temporals.format(meeting.date, 'dd MMM yyyy')}"></td>
        <td th:text="${meeting.roomId}"></td>
        <td th:text="${meeting.maxParticipants}"></td>
        <td>
            <div class="actions">
                <a th:href="@{/meetings/update/{id}(id=${meeting.id})}">Edit</a>
                <form th:action="@{/meetings/delete/{id}(id=${meeting.id})}" method="post">
                    <button type="submit" onclick="return confirm('Delete this meeting?')">Delete</button>
                </form>
            </div>
        </td>
    </tr>
    </tbody>
</table>

<p class="empty" th:if="${#lists.isEmpty(meetings)}">
    <span th:if="${isFiltered}">No meetings match your filters.</span>
    <span th:unless="${isFiltered}">No meetings scheduled.</span>
</p>

<div class="pagination" th:if="${totalPages > 1}">
    <a th:if="${currentPage > 0}"
       th:href="@{/meetings(page=${currentPage - 1}, size=${size}, name=${filterName}, dateFrom=${filterDateFrom}, dateTo=${filterDateTo}, room=${filterRoom})}">←</a>
    <span th:unless="${currentPage > 0}" class="disabled">←</span>

    <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <span th:if="${i == currentPage}" class="active" th:text="${i + 1}"></span>
        <a th:unless="${i == currentPage}"
           th:href="@{/meetings(page=${i}, size=${size}, name=${filterName}, dateFrom=${filterDateFrom}, dateTo=${filterDateTo}, room=${filterRoom})}"
           th:text="${i + 1}"></a>
    </th:block>

    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/meetings(page=${currentPage + 1}, size=${size}, name=${filterName}, dateFrom=${filterDateFrom}, dateTo=${filterDateTo}, room=${filterRoom})}">→</a>
    <span th:unless="${currentPage < totalPages - 1}" class="disabled">→</span>
</div>

</body>
</html>
